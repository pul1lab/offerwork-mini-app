  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .menu button { display: block; width: 100%; margin: 4px 0; padding: 10px; font-size: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="login" class="hidden">Пожалуйста, войдите через Telegram.</div>
  <div id="main">
    <h2>Профиль</h2>
    <p id="profile"></p>
    <div class="menu">
      <button onclick="loadClips()">📤 Клипы</button>
      <button onclick="alert('В разработке')">💰 Финансы</button>
      <button onclick="alert('В разработке')">⚙️ Настройки</button>

    </div>

    <button onclick="location.reload()">🔙 Назад</button>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const API_BASE = 'https://pgzmg-176-195-243-202.run.pinggy-free.link '; // <-- актуальный туннель
    let tg = window.Telegram.WebApp;
    tg.ready();

    // Проверяем, открыто ли внутри Telegram
    if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
      document.getElementById('login').classList.remove('hidden');
      document.getElementById('main').classList.add('hidden');
    } else {
      const userId = tg.initDataUnsafe.user.id;
      loadProfile(userId);
    }

    async function api(endpoint, userId) {
      const headers = { 'X-Telegram-ID': userId };
      const res = await fetch(`${API_BASE}${endpoint}`, { headers });
      return res.json();
    }

    async function loadProfile(userId) {
      const data = await api('/api/user/profile', userId);
      if (data.error) {
        alert('Не удалось загрузить профиль: ' + data.error);
        return;
      }
      document.getElementById('profile').innerHTML = `
        Имя: ${data.name}<br>
        Баланс: ${data.balance} ₽<br>
        Клипов: ${data.videos_count}<br>
        Друзей: ${data.referral_count}<br>
        Реквизиты: ${data.payment_info}
      `;
    }

    async function loadClips() {
      const userId = tg.initDataUnsafe.user.id;
      const data = await api('/api/user/history?page=1&limit=5', userId);
      // ... отображение клипов
    }

    async function uploadVideo() {
      const userId = tg.initDataUnsafe.user.id;
      const offers = await api('/api/offers', userId);
      // ... упрощённая загрузка (можно доработать позже)
    }
  </script>
</body>
</html>
